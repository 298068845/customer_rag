raw_data_dir: data/raw
index_dir: data/index
embedding_model_path: models/embeddings/bge-small-zh-v1.5
llm_model_path: models/llm/model.gguf

chunk_size: 700
chunk_overlap: 120
embedding_batch_size: 32
top_k: 5
search_timeout_seconds: 4
product_search_timeout_seconds: 6
precise_search_timeout_seconds: 8

llm:
  backend: llama_cpp_server
  ollama_url: http://localhost:11434
  ollama_model: deepseek-r1:1.5b
  llama_server_url: http://127.0.0.1:8081
  llama_server_host: 127.0.0.1
  llama_server_port: 8081
  llama_server_executable: ''
  llama_server_backend: auto
  n_gpu_layers: 0
  n_ctx: 4096
  n_threads: 4
  temperature: 0.2
  max_tokens: 512
  num_batch: 128
  keep_alive: 0s
