raw_data_dir: data/raw
index_dir: data/index
embedding_model_path: models/embeddings/bge-small-zh-v1.5
llm_model_path: models/llm/model.gguf

chunk_size: 700
chunk_overlap: 120
embedding_batch_size: 32
top_k: 5

llm:
  backend: ollama
  ollama_url: http://localhost:11434
  ollama_model: deepseek-r1:1.5b
  n_ctx: 2048
  n_threads: 4
  temperature: 0.2
  max_tokens: 512
  num_batch: 128
  keep_alive: 0s
